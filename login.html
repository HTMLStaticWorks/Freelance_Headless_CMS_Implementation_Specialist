<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CMS Specialist Dashboard</title>    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/dark.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body style="background: var(--background);">

    <!-- Theme/RTL Toggles (Top Right) -->
    <div class="nav-actions" style="position: fixed; top: 20px; right: 20px; z-index: 2000; display: flex; gap: 10px;">
        <button id="rtl-toggle" class="btn btn-outline">RTL</button>
        <button id="theme-toggle" class="btn btn-outline"><i class="ri-sun-line"></i></button>
    </div>

    <!-- Auth Section -->
    <section class="section auth-section" style="padding-top: 80px; min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div class="container">
            <div class="d-flex justify-content-center mb-4">
                <a href="index.html" class="logo" style="font-size: 2rem !important;"><i class="ri-stack-line text-accent"></i> CMS<span>Specialist</span></a>
            </div>
            <div class="row justify-content-center">
                <div class="col-lg-5">
                    <div class="card p-5">
                        <div class="text-center mb-5">
                            <h2 class="mb-2">Welcome Back</h2>
                            <p class="text-secondary small">Access your implementation dashboard</p>
                        </div>
                        <form>
                            <div class="mb-4">
                                <label class="small fw-bold mb-2">Email Address</label>
                                <input type="email" class="form-control" placeholder="name@company.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="small fw-bold mb-2">Password</label>
                                <div class="password-wrapper">
                                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                                    <i class="ri-eye-line toggle-password" id="togglePassword"></i>
                                </div>
                            </div>

                            <div class="mb-4 d-flex justify-content-between align-items-center">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label small text-secondary" for="remember">Remember me</label>
                                </div>
                                <a href="#" class="small text-accent">Forgot Password?</a>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary py-3 mb-4">Sign In</button>
                            </div>
                            
                            <div class="d-flex justify-content-center w-100">
                                <p class="text-secondary small mb-0">Don't have an account? <a href="signup.html" class="text-accent fw-bold">Sign Up</a></p>
                            </div>
                        </form>

                        <div class="d-flex align-items-center my-4">
                            <div class="flex-grow-1 border-top border-secondary opacity-25"></div>
                            <span class="px-3 text-secondary small">Or continue with</span>
                            <div class="flex-grow-1 border-top border-secondary opacity-25"></div>
                        </div>

                        <div class="d-flex justify-content-center" style="gap: 24px !important;">
                            <button class="btn btn-outline" style="width: 48px; height: 48px; padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ri-google-fill ri-xl"></i></button>
                            <button class="btn btn-outline" style="width: 48px; height: 48px; padding: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center;"><i class="ri-apple-fill ri-xl"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="assets/js/theme-toggle.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function (e) {
            // toggle the type attribute
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            // toggle the eye / eye slash icon
            this.classList.toggle('ri-eye-line');
            this.classList.toggle('ri-eye-off-line');
        });
    </script>
</body>
</html>
